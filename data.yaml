event_info:
  name: "Levitate 2026: The Anti-Gravity & Advanced Propulsion Symposium"
  tagline: "Defy the Pull"
  date: "November 12-13, 2026"
  location: "AeroSpace Tech Center, Geneva, Switzerland"
  description: "Join the world's leading minds in anti-gravity research, quantum levitation, and advanced propulsion systems for a groundbreaking two-day symposium. Levitate 2026 explores the bleeding edge of theoretical physics and practical engineering that will lift humanity to the stars."

speakers:
  - slug: "dr-elara-vance"
    name: "Dr. Elara Vance"
    title: "Director of Quantum Levitation"
    company: "MIT & Gravitas Dynamics"
    bio: "Dr. Vance holds a Ph.D. in Theoretical Physics from MIT, where she pioneered the Vance-Cooper effect for localized gravity disruption. Her recent work focuses on scaling quantum levitation for commercial transport applications. She is a recipient of the prestigious Feynman Prize and holds 12 patents in advanced propulsion."
    photo: "https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?auto=format&fit=crop&q=80&w=600"
    talk_title: "Scaling Quantum Levitation: From Lab to Lithosphere"
    talk_abstract: "This session explores the engineering hurdles and recent breakthroughs in applying quantum levitation models to macro-scale objects. Dr. Vance will present empirical data from the recent Titan-3 experiments."

  - slug: "prof-marcus-thornton"
    name: "Prof. Marcus Thornton"
    title: "Head of Advanced Propulsion"
    company: "Oxford University"
    bio: "A leading authority on zero-point energy manipulation, Professor Thornton has spent the last two decades challenging the fundamental limits of general relativity. His controversial yet mathematically rigorous papers on spacetime warping have sparked a new era of propulsion research. He is the author of 'The Fabric of Falling: Rethinking Gravity'."
    photo: "https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=600"
    talk_title: "Zero-Point Energy Extraction for Deep Space Thrust"
    talk_abstract: "An analytical review of methods for tapping into zero-point energy fields to achieve continuous thrust without conventional propellant. We will examine the thermodynamic boundaries and proposed containment architectures."

  - slug: "dr-sarah-jenkins"
    name: "Dr. Sarah Jenkins"
    title: "Chief Engineer"
    company: "Ascend Aerospace"
    bio: "Dr. Jenkins transitioned from traditional orbital mechanics to exotic propulsion after a decade at NASA. At Ascend Aerospace, she leads the team developing the first commercially viable diamagnetic levitation platforms. Her pragmatic engineering approach grounds theoretical physics into workable prototypes."
    photo: "https://images.unsplash.com/photo-1580489944761-15a19d654956?auto=format&fit=crop&q=80&w=600"
    talk_title: "Diamagnetic Arrays: Commercializing Hover Tech"
    talk_abstract: "A practical walkthrough of Ascend Aerospace's latest prototype, focusing on the material science required to sustain high-intensity diamagnetic fields at room temperature."

  - slug: "alexander-kotev"
    name: "Alexander Kotev"
    title: "Founder & CEO"
    company: "Kotev Dynamics"
    bio: "A prodigy in electromagnetic fluid dynamics, Alexander founded Kotev Dynamics at age 22. His company is at the forefront of creating fluidic-magnetic shielding systems for high-speed atmospheric transit. His vision is a frictionless global transit network by 2040."
    photo: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&q=80&w=600"
    talk_title: "Frictionless Transit: The Aerodynamics of Anti-Gravity"
    talk_abstract: "When gravity is negated, aerodynamics becomes the primary hurdle. This talk details the fluidic-magnetic shielding necessary for hyper-velocity atmospheric travel without thermal destruction."

  - slug: "dr-li-wei"
    name: "Dr. Li Wei"
    title: "Senior Researcher, Theoretical Physics"
    company: "Beijing Institute of Technology"
    bio: "Dr. Wei's research investigates the intersection of dark matter and gravitational fields. His recent simulation models suggest potential localized manipulation of the Higgs field to reduce inertial mass. He regularly collaborates with international teams on the unified field project."
    photo: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&q=80&w=600"
    talk_title: "Inertial Mass Reduction via Higgs Field Modulation"
    talk_abstract: "Presenting findings from the latest supercomputer simulations on altering inertial mass. If viable, this theoretical approach could solve the g-force limitations on human spaceflight."

  - slug: "dr-chloe-adams"
    name: "Dr. Chloe Adams"
    title: "Lead Materials Scientist"
    company: "European Space Agency (ESA)"
    bio: "Dr. Adams specializes in metamaterials engineered for exotic gravitational interactions. Her team at ESA recently synthesized a novel alloy that exhibits negative mass characteristics under specific cryogenic conditions. She holds a double doctorate in Chemistry and Physics."
    photo: "https://images.unsplash.com/photo-1594744803329-e58b31de8bf5?auto=format&fit=crop&q=80&w=600"
    talk_title: "Metamaterials for Negative Mass Simulation"
    talk_abstract: "An exploration of the synthesis and properties of the newly discovered 'Alloy-88'. We will discuss its potential to act as a physical substrate for anti-gravity drive cores."

  - slug: "samuel-rodriguez"
    name: "Samuel Rodriguez"
    title: "Director of Zero-G Operations"
    company: "Orbital Assembly"
    bio: "Samuel oversees the practical implementation of artificial gravity and anti-gravity systems on orbital platforms. With a background in structural engineering and orbital mechanics, he ensures that theoretical drives do not tear experimental stations apart. He previously managed ISS life-support systems."
    photo: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=600"
    talk_title: "Structural Integrity under Non-Standard Gravity Loads"
    talk_abstract: "A critical look at how spacecraft and terrestrial platforms must be redesigned to withstand the sheer forces generated by localized gravity disruption and propulsion systems."

  - slug: "prof-elena-rostova"
    name: "Prof. Elena Rostova"
    title: "Chair of Quantum Cosmology"
    company: "CERN"
    bio: "Professor Rostova is a theoretical cosmologist working at CERN. Her focus is on gravitational waves and their potential for manipulation. She is currently leading a controversial project attempting to generate microscopic gravitational wave interference patterns."
    photo: "https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=600"
    talk_title: "Gravitational Wave Interference as a Propulsion Mechanism"
    talk_abstract: "Discussing the theoretical framework for using constructive and destructive interference of high-frequency gravitational waves to create directed spacetime curvature for propulsion."

